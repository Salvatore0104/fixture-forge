name: Build Windows Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v1.1.0
        required: true
        default: v1.0.0
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if (-not $version) { $version = "${{ github.ref_name }}" }
          $plainVersion = $version.TrimStart("v")
          ./scripts/build-windows-installer.ps1 -Version $plainVersion

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FixtureForge-Windows-Installer
          path: dist/installer/*.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/installer/*.exe
